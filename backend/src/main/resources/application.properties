spring.application.name=simple-survey-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sky_survey_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=filesystem:${FLYWAY_MIGRATIONS_PATH:../database/migration}

file.upload.path=${FILE_UPLOAD_PATH:media file}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql=warn
